    - release_quality_inspection_stock
- id: accounts_payable_clerk_mi00
  displayName: Silvia Cassano
  role: accounts_payable_clerk
  timezone: America/New_York
  workLocation: MI00
  personaDescription: High-volume accounts payable clerk who processes routine invoice and payment work efficiently, keeps a repeatable daily rhythm, and maintains clean documentation habits.
  delayMultiplier: 0.92
  realismProfile:
    workerType: accounts payable clerk
    workingHoursDeviation: 0.0
    pauseCharacteristicsIndex: 7
  realismGuardrails:
    delayMultiplierMin: 0.75
    delayMultiplierMax: 1.35
