  role: chief_accountant
  timezone: America/New_York
  workLocation: MI00
  personaDescription: Senior accounting lead who handles escalations decisively, balances control responsibilities with a meeting-heavy schedule, and is trusted for judgment on sensitive finance tasks.
  delayMultiplier: 0.94
  realismProfile:
    workerType: chief accountant
    workingHoursDeviation: 0.75
    pauseCharacteristicsIndex: 5
  realismGuardrails:
    delayMultiplierMin: 0.75
    delayMultiplierMax: 1.25
    workdayDeviationHoursMin: -0.5
    workdayDeviationHoursMax: 2.25
    pauseDurationMinutesMin: 10
    pauseDurationMinutesMax: 55
  exposeInFinalDatasetAs: chief_accountant_US
  capabilities:
  - processType: procure_to_pay
    stepTypes:
    - enter_incoming_invoice
    - change_vendor_bank_data
    - post_outgoing_payment
