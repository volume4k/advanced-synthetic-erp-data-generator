- id: goods_receipt_clerk_mi00
  displayName: Tatiana Karsova
  role: goods_receipt_clerk
  timezone: America/New_York
  workLocation: MI00
  personaDescription: Busy warehouse receiver who starts early, coordinates goods movement around inbound deliveries and floor interruptions, and works at a practical pace shaped by physical handling constraints.
  delayMultiplier: 1.38
  realismProfile:
    workerType: goods receipt clerk
    workingHoursDeviation: -1.0
    pauseCharacteristicsIndex: 12
  realismGuardrails:
    delayMultiplierMin: 1.05
    delayMultiplierMax: 2.3
