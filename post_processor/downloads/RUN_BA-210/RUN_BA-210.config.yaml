processes:
- processType: procure_to_pay
  scenarioType: NORMAL
  steps:
  - stepId: A1
    stepType: create_purchase_requisition
    tool:
      toolName: fiori.create_purchase_requisition
      title: Create Purchase Requisition
      inputModel: CreatePurchaseRequisitionInput
      requiredInputFields:
      - material
      - quantity
      - valuation_price
      - currency
      - price_unit
      - delivery_date
      - plant
      - purchasing_group
      - purchasing_organization
      - company_code
      inputProperties:
      - name: material
        schemaType: string
        required: true
      - name: quantity
        schemaType: integer
        required: true
      - name: valuation_price
        schemaType: number
        required: true
      - name: currency
        schemaType: string
        required: true
      - name: price_unit
        schemaType: integer
        required: true
      - name: delivery_date
        schemaType: string
        required: true
      - name: plant
        schemaType: string
        required: true
      - name: purchasing_group
        schemaType: string
        required: true
      - name: purchasing_organization
        schemaType: string
        required: true
      - name: company_code
        schemaType: string
        required: true
    inputBindings:
    - field: material
      source: master_data
      value: materialId
      valueType: string
    - field: quantity
      source: case
      value: quantity
      valueType: string
    - field: valuation_price
      source: case
      value: target_price
      valueType: string
    - field: currency
      source: master_data
      value: currency
      valueType: string
    - field: price_unit
      source: literal
      value: '1'
      valueType: int
    - field: delivery_date
      source: derived
      value: fiori_delivery_date
      valueType: string
    - field: plant
      source: master_data
      value: plant
      valueType: string
    - field: purchasing_group
      source: literal
      value: N00
      valueType: string
    - field: purchasing_organization
      source: master_data
      value: purchasing_org
      valueType: string
    - field: company_code
      source: master_data
      value: purchasing_org
      valueType: string
    plannedDateInputBindings:
    - field: delivery_date
      source: derived
      value: fiori_delivery_date
      valueType: string
    requiredSapObjectKeys:
    - purchase_requisition.pr_number
    objectOutputRequired: true
    labels: {}
    businessDateGate: none
    materialValuationLock: false
    runtimeDateOverrides: []
  - stepId: A2
    stepType: create_purchase_order
    tool:
      toolName: fiori.create_purchase_order
      title: Create Purchase Order
      inputModel: CreatePurchaseOrderInput
      requiredInputFields:
      - purchase_requisition
      - storage_location
      - supplier
      - quantity
      - net_price
      inputProperties:
      - name: purchase_requisition
        schemaType: string
        required: true
      - name: storage_location
        schemaType: string
        required: true
      - name: supplier
        schemaType: string
        required: true
      - name: quantity
        schemaType: integer
        required: true
      - name: net_price
        schemaType: number
        required: true
      - name: tax_code
        schemaType: string
        required: false
        defaultValue: XI
    inputBindings:
    - field: purchase_requisition
      source: prior_output
      value: purchase_requisition.pr_number
      valueType: string
    - field: storage_location
      source: case
      value: storage_location
      valueType: string
    - field: supplier
      source: master_data
      value: vendor_id
      valueType: string
    - field: quantity
      source: case
      value: quantity
      valueType: string
    - field: net_price
      source: case
      value: target_price
      valueType: string
    plannedDateInputBindings: []
    requiredSapObjectKeys:
    - purchase_order.po_number
    objectOutputRequired: true
    labels: {}
    businessDateGate: none
    materialValuationLock: false
    runtimeDateOverrides: []
  - stepId: A3
    stepType: post_goods_receipt
    tool:
      toolName: fiori.create_goods_receipt
      title: Create Goods Receipt
      inputModel: CreateGoodsReceiptInput
      requiredInputFields:
      - purchase_order
      - storage_location
      inputProperties:
      - name: purchase_order
        schemaType: string
        required: true
      - name: storage_location
        schemaType: string
        required: true
    inputBindings:
    - field: purchase_order
      source: prior_output
      value: purchase_order.po_number
      valueType: string
    - field: storage_location
      source: derived
      value: storage_location_label
      valueType: string
    plannedDateInputBindings:
    - field: document_date
      source: derived
      value: fiori_delivery_date
      valueType: string
    - field: posting_date
      source: derived
      value: fiori_delivery_date
      valueType: string
    requiredSapObjectKeys:
    - material_document.material_document_number
    objectOutputRequired: true
    labels: {}
    businessDateGate: delivery_date
    materialValuationLock: true
    runtimeDateOverrides:
    - objectType: material_document
      fields:
      - document_date
      - posting_date
      runtimeValuePolicy: sap_current_date
      source: planned_date_inputs
      reason: sap_runtime_forces_current_date
  - stepId: A4
    stepType: enter_incoming_invoice
    tool:
      toolName: fiori.create_supplier_invoice
      title: Create Supplier Invoice
      inputModel: CreateSupplierInvoiceInput
      requiredInputFields:
      - gross_amount
      - purchase_order
      - tax_code
      inputProperties:
      - name: gross_amount
        schemaType: number
        required: true
      - name: purchase_order
        schemaType: string
        required: true
      - name: tax_code
        schemaType: string
        required: true
    inputBindings:
    - field: gross_amount
      source: derived
      value: gross_amount
      valueType: string
    - field: purchase_order
      source: prior_output
      value: purchase_order.po_number
      valueType: string
    - field: tax_code
      source: literal
      value: XI
      valueType: string
    plannedDateInputBindings:
    - field: invoice_date
      source: derived
      value: fiori_delivery_date
      valueType: string
    requiredSapObjectKeys:
    - supplier_invoice.invoice_number
    - supplier_invoice.fiscal_year
    objectOutputRequired: true
    labels: {}
    businessDateGate: delivery_date
    materialValuationLock: true
    runtimeDateOverrides:
    - objectType: supplier_invoice
      fields:
      - invoice_date
      runtimeValuePolicy: executor_current_date
      source: planned_date_inputs
      reason: executor_uses_current_date_for_sap_runtime
  - stepId: A5
    stepType: post_outgoing_payment
    tool:
      toolName: fiori.send_payment
      title: Send Payment
      inputModel: SendPaymentInput
      requiredInputFields:
      - company_code
      - posting_document_date
      - supplier
      - accounting_document
      - general_ledger_account
      - amount
      inputProperties:
      - name: company_code
        schemaType: string
        required: true
      - name: posting_document_date
        schemaType: string
        required: true
      - name: supplier
        schemaType: string
        required: true
      - name: accounting_document
        schemaType: string
        required: true
      - name: general_ledger_account
        schemaType: string
        required: true
      - name: amount
        schemaType: number
        required: true
      - name: currency
        schemaType: string
        required: false
        defaultValue: USD
      - name: posting_date
        schemaType: string | null
        required: false
    inputBindings:
    - field: company_code
      source: master_data
      value: purchasing_org
      valueType: string
    - field: posting_document_date
      source: derived
      value: fiori_delivery_date
      valueType: string
    - field: posting_date
      source: derived
      value: fiori_payment_posting_date
      valueType: string
    - field: supplier
      source: master_data
      value: vendor_id
      valueType: string
    - field: accounting_document
      source: prior_output
      value: supplier_invoice.invoice_number
      valueType: string
    - field: general_ledger_account
      source: literal
      value: '1800000'
      valueType: string
    - field: amount
      source: derived
      value: gross_amount
      valueType: string
    - field: currency
      source: master_data
      value: currency
      valueType: string
    plannedDateInputBindings:
    - field: posting_document_date
      source: derived
      value: fiori_delivery_date
      valueType: string
    - field: posting_date
      source: derived
      value: fiori_payment_posting_date
      valueType: string
    requiredSapObjectKeys:
    - payment_document.payment_document_number
    objectOutputRequired: true
    labels: {}
    businessDateGate: payment_posting_date
    materialValuationLock: false
    runtimeDateOverrides: []
  dependencies:
  - fromStepType: create_purchase_requisition
    toStepType: create_purchase_order
    description: Create purchase order after purchase requisition because A2 needs the purchase requisition number produced by A1.
  - fromStepType: create_purchase_order
    toStepType: post_goods_receipt
    description: Post goods receipt after purchase order creation because A3 requires the purchase order created by A2.
  - fromStepType: post_goods_receipt
    toStepType: enter_incoming_invoice
    description: Enter incoming invoice after goods receipt in the version-one procure-to-pay flow.
  - fromStepType: enter_incoming_invoice
    toStepType: post_outgoing_payment
    description: Post outgoing payment after incoming invoice entry because payment requires an invoice.
