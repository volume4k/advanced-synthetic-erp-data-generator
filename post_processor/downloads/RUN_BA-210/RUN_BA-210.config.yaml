actors:
- id: inventory_manager_mi00
  displayName: Wilton Saban
  role: inventory_manager
  timezone: America/New_York
  workLocation: MI00
  personaDescription: Floor-connected inventory manager who starts early, coordinates practical stock needs with warehouse realities, and keeps requisition work moving around operational interruptions.
  delayMultiplier: 1.18
  realismProfile:
    workerType: inventory manager
    workingHoursDeviation: -0.75
    pauseCharacteristicsIndex: 11
  realismGuardrails:
    delayMultiplierMin: 0.95
    delayMultiplierMax: 1.8
    workdayDeviationHoursMin: -1.75
    workdayDeviationHoursMax: 0.75
