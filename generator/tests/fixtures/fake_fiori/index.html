<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Fake Fiori Fixture</title>
    <style>
      body {
        font-family: sans-serif;
        margin: 2rem;
      }

      [hidden] {
        display: none;
      }

      form {
        display: grid;
        gap: 0.75rem;
        max-width: 24rem;
      }
    </style>
  </head>
  <body>
    <h1>Fake Fiori Fixture</h1>

    <section data-testid="login-shell">
      <form id="login-form">
        <label>
          Username
          <input data-testid="username" id="username" name="username" />
        </label>
        <label>
          Password
          <input data-testid="password" id="password" name="password" type="password" />
        </label>
        <button data-testid="login-submit" type="submit">Login</button>
      </form>
    </section>

    <section data-testid="session-shell" hidden>
      <p>Logged in as <strong data-testid="session-user"></strong></p>
      <form id="purchase-requisition-form">
        <label>
          Material
          <input data-testid="pr-material" id="pr-material" name="pr-material" />
        </label>
        <label>
          Anforderungsmenge
          <input data-testid="pr-quantity" id="pr-quantity" name="pr-quantity" type="number" min="1" />
        </label>
        <label>
          Bewertungspreis
          <input data-testid="pr-valuation-price" id="pr-valuation-price" name="pr-valuation-price" type="number" min="1" />
        </label>
        <label>
          Currency
          <input data-testid="pr-currency" id="pr-currency" name="pr-currency" />
        </label>
        <label>
          Preiseinheit
          <input data-testid="pr-price-unit" id="pr-price-unit" name="pr-price-unit" type="number" min="1" />
        </label>
        <label>
          Lieferdatum
          <input data-testid="pr-delivery-date" id="pr-delivery-date" name="pr-delivery-date" />
        </label>
        <label>
          Werk
          <input data-testid="pr-plant" id="pr-plant" name="pr-plant" />
        </label>
        <label>
          Einkäufergruppe
          <input data-testid="pr-purchasing-group" id="pr-purchasing-group" name="pr-purchasing-group" />
        </label>
        <label>
          EinkOrganisation
          <input data-testid="pr-purchasing-organization" id="pr-purchasing-organization" name="pr-purchasing-organization" />
        </label>
        <label>
          Buchungskreis
          <input data-testid="pr-company-code" id="pr-company-code" name="pr-company-code" />
        </label>
        <button data-testid="pr-cart" id="application-PurchaseRequisition-create-component---Freetext--btnCart" type="button">
          Add to cart
        </button>
        <button id="pr-submit" type="submit">Bestellen</button>
      </form>
      <p>Purchase requisition: <a id="idPRNoLinkId" hidden></a></p>
    </section>

    <script>
      const loginShell = document.querySelector('[data-testid="login-shell"]');
      const sessionShell = document.querySelector('[data-testid="session-shell"]');
      const sessionUser = document.querySelector('[data-testid="session-user"]');
      const requisitionLink = document.getElementById("idPRNoLinkId");

      const render = () => {
        const username = window.sessionStorage.getItem("fixture-user");

        if (username) {
          loginShell.hidden = true;
          sessionShell.hidden = false;
          sessionUser.textContent = username;
        } else {
          loginShell.hidden = false;
          sessionShell.hidden = true;
          sessionUser.textContent = "";
        }
      };

      document.getElementById("login-form").addEventListener("submit", (event) => {
        event.preventDefault();
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        if (!username || !password) {
          return;
        }

        window.sessionStorage.setItem("fixture-user", username);
        render();
      });

      document.getElementById("purchase-requisition-form").addEventListener("submit", (event) => {
        event.preventDefault();
        requisitionLink.textContent = "PR-0001";
        requisitionLink.hidden = false;
      });

      render();
    </script>
  </body>
</html>
